services:
  postgres-auth:
    image: postgres:16
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - auth-data:/var/lib/postgresql/data
      - ./auth-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-user:
    image: postgres:16
    container_name: postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_PASSWORD: secret
    ports:
      - "5434:5432"
    volumes:
      - user-data:/var/lib/postgresql/data
      - ./user-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-post:
    image: postgres:16
    container_name: postgres-post
    environment:
      POSTGRES_DB: post_db
      POSTGRES_PASSWORD: secret
    ports:
      - "5435:5432"
    volumes:
      - post-data:/var/lib/postgresql/data
      - ./post-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-notification:
    image: postgres:16
    container_name: postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_PASSWORD: secret
    ports:
      - "5436:5432"
    volumes:
      - notification-data:/var/lib/postgresql/data
      - ./notification-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - media-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth-service:
    build: ./auth-service
    container_name: auth-service
    env_file: ./auth-service/.env
    depends_on:
      postgres-auth:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user-service:
    build: ./user-service
    container_name: user-service
    env_file: ./user-service/.env
    depends_on:
      postgres-user:
        condition: service_healthy
      kafka:
        condition: service_healthy

  post-service:
    build: ./post-service
    container_name: post-service
    env_file: ./post-service/.env
    depends_on:
      postgres-post:
        condition: service_healthy
      kafka:
        condition: service_healthy

  feed-service:
    build: ./feed-service
    container_name: feed-service
    env_file: ./feed-service/.env
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build: ./notification-service
    container_name: notification-service
    env_file: ./notification-service/.env
    depends_on:
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "3004:3004"

  media-service:
    build: ./media-service
    container_name: media-service
    env_file: ./media-service/.env
    depends_on:
      minio:
        condition: service_healthy

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    env_file: ./api-gateway/.env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:3000
      - USER_SERVICE_URL=http://user-service:3001
      - POST_SERVICE_URL=http://post-service:3002
      - FEED_SERVICE_URL=http://feed-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
      - MEDIA_SERVICE_URL=http://media-service:3005
    ports:
      - "4000:8080"
    depends_on:
      - auth-service
      - user-service
      - post-service
      - feed-service
      - notification-service
      - media-service

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:4000/api
        - VITE_SOCKET_URL=http://localhost:3004
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

volumes:
  auth-data:
  user-data:
  post-data:
  notification-data:
  media-data:
