name: auth-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'auth-service/**'
      - '.github/workflows/auth-service-ci-cd.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./auth-service
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint
      - name: Run Tests
        run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Docker Hub push scope
        id: docker-scope
        if: env.DOCKER_USER != '' && env.DOCKER_TOKEN != ''
        run: |
          auth_response=$(curl -fsSL -u "${DOCKER_USER}:${DOCKER_TOKEN}" "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${DOCKER_USER}/auth-service:push,pull" || echo '{}')
          has_push_scope=$(echo "$auth_response" | jq -r '[.access[]?.actions[]?] | any(. == "push")')
          echo "has_push_scope=$has_push_scope" >> "$GITHUB_OUTPUT"

          if [ "$has_push_scope" != "true" ]; then
            echo "::warning::Docker Hub token cannot push ${DOCKER_USER}/auth-service. Building image without push."
          fi

      - name: Login to Docker Hub
        if: env.DOCKER_USER != '' && env.DOCKER_TOKEN != '' && steps.docker-scope.outputs.has_push_scope == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_TOKEN }}
          
      - name: Build and Push Docker image
        if: env.DOCKER_USER != '' && env.DOCKER_TOKEN != '' && steps.docker-scope.outputs.has_push_scope == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ${{ env.DOCKER_USER }}/auth-service:latest

      - name: Build Docker image (without push)
        if: env.DOCKER_USER != '' && env.DOCKER_TOKEN != '' && steps.docker-scope.outputs.has_push_scope != 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: false

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          # The URL below is stored securely in GitHub Secrets. 
          # You will need to paste the actual Deploy Hook URL from your Render dashboard into the secret RENDER_DEPLOY_HOOK_AUTH
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}" ]; then echo "No deploy hook configured yet. Skipping."; else curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_AUTH }}; fi
