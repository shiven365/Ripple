name: feed-service CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'feed-service/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./feed-service
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run Lint
        run: npm run lint
      - name: Run Tests
        run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./feed-service
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/feed-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          # The URL below is stored securely in GitHub Secrets. 
          # You will need to paste the actual Deploy Hook URL from your Render dashboard into the secret RENDER_DEPLOY_HOOK_FEED
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_FEED }}" ]; then echo "No deploy hook configured yet. Skipping."; else curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FEED }}; fi
